<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yonetim Paneli</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="section-head admin-head">
        <img src="./mest-logo.png" alt="Mest Logo" class="mini-logo" />
        <button class="button secondary" onclick="logout()">Cikis Yap</button>
      </section>
      <section class="grid three">
        <article class="card"><strong>Hizmet Talepleri</strong><span class="metric">12</span></article>
        <article class="card"><strong>Randevu Talepleri</strong><span class="metric">4</span></article>
        <article class="card"><strong>Yeni Siparisler</strong><span class="metric">7</span></article>
      </section>
      <section class="grid split">
        <article class="card">
          <h2>Son Bildirimler</h2>
          <p>Yeni teklif talebi olustu.</p>
          <p>WhatsApp bildirim kuyrugu hazirlandi.</p>
          <p>Yeni siparis odeme bekliyor.</p>
        </article>
        <article class="card">
          <h2>Urun Stoklari</h2>
          <p>Kompakt Mini Pano: 18</p>
          <p>NYAF Kablo Seti: 34</p>
          <p>Wi-Fi Role Modulu: 52</p>
        </article>
      </section>
    </main>
    <script src="./preview.js"></script>
  </body>
</html>
